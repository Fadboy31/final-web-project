<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Quest 6</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    form {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      max-width: 500px;
      margin: auto;
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin-bottom: 10px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <h1>Task Manager</h1>

  <form id="task-form">
    <input id="task-input-field" type="text" placeholder="Enter task..." required>
    <button type="submit">Add</button>
  </form>

  <ul id="tasks"></ul>

  <script>
    // STATE
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    // ELEMENTS
    const form = document.getElementById("task-form");
    const input = document.getElementById("task-input-field");
    const taskList = document.getElementById("tasks");

    // ADD TASK
    function addTask(text) {
      const newTask = {
        id: Date.now(),
        text: text,
        completed: false
      };

      tasks.push(newTask);
      saveTasks();
      renderTasks();
    }

    // RENDER TASKS
    function renderTasks() {
      taskList.innerHTML = "";

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.textContent = task.text;

        if (task.completed) {
          li.classList.add("completed");
        }

        // TOGGLE COMPLETE
        li.addEventListener("click", () => {
          toggleTask(task.id);
        });

        // DELETE BUTTON
        const btn = document.createElement("button");
        btn.textContent = "Delete";

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteTask(task.id);
        });

        li.appendChild(btn);
        taskList.appendChild(li);
      });
    }

    // TOGGLE TASK
    function toggleTask(id) {
      tasks = tasks.map(task =>
        task.id === id
          ? { ...task, completed: !task.completed }
          : task
      );

      saveTasks();
      renderTasks();
    }

    // DELETE TASK
    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);

      saveTasks();
      renderTasks();
    }

    // SAVE TO LOCAL STORAGE
    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    // EVENT LISTENER
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const text = input.value.trim();
      if (text === "") return;

      addTask(text);
      input.value = "";
    });

    // INITIAL LOAD
    renderTasks();
  </script>

</body>
</html>
